{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{.CSRFToken}}">
    <title>Copilot Proxy Admin</title>
    <link rel="stylesheet" href="/admin/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1><span class="accent">&gt;_</span> copilot-proxy</h1>
            </div>
            <nav>
                <a href="/admin/users" class="nav-link {{if eq .ActiveNav "users"}}active{{end}}">Users</a>
                <a href="/admin/settings" class="nav-link {{if eq .ActiveNav "settings"}}active{{end}}">Settings</a>
                <form method="POST" action="/admin/logout" style="display:inline;">
                    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            </nav>
        </header>
        <main>
            {{template "content" .}}
        </main>
    </div>
    <script src="/admin/static/app.js"></script>
</body>
</html>
{{end}}
