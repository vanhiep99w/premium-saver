{{define "content"}}
<div class="page-header">
    <div>
        <h2>Initiator Settings</h2>
        <p style="color:var(--text-secondary);margin-top:6px;">Control how often the proxy sends <code>x-initiator: user</code> instead of <code>agent</code>.</p>
    </div>
</div>

<section class="stats-section">
    <div class="modal-content" style="max-width:560px;margin:0;">
        <h3>Runtime Policy</h3>
        <p class="subtitle" style="margin:10px 0 18px;">Current behavior: send <strong>{{.UserEvery}}</strong> request(s) as <code>agent</code>, then <strong>1</strong> request as <code>user</code>. Changes apply immediately to future requests and reset on server restart.</p>

        <form method="POST" action="/admin/settings">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <label for="user_every" style="display:block;margin-bottom:8px;color:var(--text-secondary);font-size:13px;">Agent requests before one user request</label>
            <input
                id="user_every"
                name="user_every"
                type="number"
                min="1"
                value="{{.UserEvery}}"
                style="width:100%;padding:11px 16px;border:1px solid var(--border);border-radius:8px;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-ui);font-size:14px;"
            >
            <div class="modal-actions" style="margin-top:18px;">
                <button type="submit" class="btn-primary">Save Runtime Setting</button>
            </div>
        </form>
    </div>
</section>
{{end}}
